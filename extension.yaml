extension:
    name: wow/ext-sfpanel-container
    label: Containers
    description: Docker container management and Compose stack deployment for sfPanel.
    version: 1.0.0
    license: MIT
    namespace: Wow\Ext\Containers

    author:
        name: sfPanel
        url: https://github.com/wow

    require:
        sfpanel: ">=1.0.0"
        php: ">=8.4"

    permissions:
        filesystem:
            read: [/var/run/docker.sock]
            write: [/stacks]
        system:
            commands: [docker]
        hooks:
            events_emit:
                - Wow\Ext\Containers\Contracts\Event\ContainerActionEvent
                - Wow\Ext\Containers\Contracts\Event\StackDeployedEvent

    capabilities:
        routes: true
        menu_items: true
        translations: true
        assets: true
